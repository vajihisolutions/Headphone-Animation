<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#7cb686">
  <title>Headphone Animation - Premium Wireless Headphones</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="slider-main">
    <div class="container">
        <div class="logo">
            <a href="#"><img src="logo.svg" alt="logo"></a>
        </div>
        <div class="slider-content-wrap">
            <div class="slider-content">
                <h2 class="heading-style-2 product-title">Apple AirPods Max Wireless Over-Ear Headphones.</h2>
                <p class="product-description">Active Noise Cancelling, Transparency Mode, Spatial Audio, Digital Crown for Volume Control. Bluetooth Headphones for iPhone</p>
                <h3 class="heading-style-2 product-price">$699.99</h3>
                <div class="social-icons">
                    <a href="#"><img src="instagram.svg" alt="instagram"></a>
                    <a href="#"><img src="facebook.svg" alt="facebook"></a>
                    <a href="#"><img src="twitter.svg" alt="twitter"></a>
                </div>
            </div>
        </div>
    </div>

    <div class="slider-images">
        <img class="slider-image" src="green.png" alt="green headphone">
        <img class="slider-image" src="blue.png" alt="blue headphone">
        <img class="slider-image" src="red.png" alt="red headphone">
        <img class="slider-image" src="white.png" alt="white headphone">
        <img class="slider-image" src="black.png" alt="black headphone">
    </div>

    <div id="backgrounds">
        <div class="background" style="background: radial-gradient(50% 50% at 50% 50%, #C7F6D0 0%, #7CB686 92.19%);"></div>
        <div class="background" style="background: radial-gradient(50% 50% at 50% 50%, #D1E4F6 0%, #5F9CCF 100%);"></div>
        <div class="background" style="background: radial-gradient(50% 50% at 50% 50%, #FFB7B2 0%, #ED746E 100%);"></div>
        <div class="background" style="background: radial-gradient(50% 50% at 50% 50%, #D7D7D7 0%, #979797 100%);"></div>
        <div class="background" style="background: radial-gradient(50% 50% at 50% 50%, #6B6B6B 0%, #292929 100%);"></div>
    </div>
</section>

<script src="script.js"></script>

</body>
</html>
